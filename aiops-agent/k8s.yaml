apiVersion: v1
kind: ServiceAccount
metadata:
  name: aiops-agent
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: aiops-agent
  namespace: default
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: aiops-agent
  namespace: default
subjects:
  - kind: ServiceAccount
    name: aiops-agent
    namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: aiops-agent
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aiops-agent
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aiops-agent
  template:
    metadata:
      labels:
        app: aiops-agent
    spec:
      serviceAccountName: aiops-agent
      containers:
        - name: aiops-agent
          image: aiops-agent:local
          imagePullPolicy: Never
          env:
            - name: PROMETHEUS_URL
              value: http://prometheus.monitoring.svc.cluster.local:9090
            - name: K8S_NAMESPACE
              value: default
            - name: OPENAI_MODEL
              valueFrom:
                secretKeyRef:
                  name: aiops-agent-secrets
                  key: OPENAI_MODEL
                  optional: true
            - name: OPENAI_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: aiops-agent-secrets
                  key: OPENAI_BASE_URL
                  optional: true
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: aiops-agent-secrets
                  key: OPENAI_API_KEY
            - name: REASONING_EFFORT
              valueFrom:
                secretKeyRef:
                  name: aiops-agent-secrets
                  key: REASONING_EFFORT
                  optional: true
            - name: ENABLE_THINKING
              valueFrom:
                secretKeyRef:
                  name: aiops-agent-secrets
                  key: ENABLE_THINKING
                  optional: true
            - name: RECOMMENDATION_CPU_THRESHOLD
              value: "0.1"
            - name: FRONTEND_CPU_THRESHOLD
              value: "0.1"
